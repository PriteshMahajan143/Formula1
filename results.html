<body>

<h2>Race Weekend Results</h2>

<label>Select Race:</label>

<label>Select Session:</label>
<select id="sessionSelect">

<option value="FP1">FP1</option>

<option value="SprintRace">Sprint Race</option>

</select>

<button onclick="loadResults()">Load Results</button>

<table id="resultsTable">

<thead>
<tr>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyDKKYg5DzOyj-b4yiZbLZLqki12SIvqn-w",
authDomain: "formula1-93967.firebaseapp.com",
projectId: "formula1-93967",
storageBucket: "formula1-93967.firebasestorage.app",
messagingSenderId: "605887356094",
appId: "1:605887356094:web:ea144cee6a249791d612ef",
measurementId: "G-GZREC19YKH"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



async function loadRaces(){

const racesSnapshot = await getDocs(collection(db,"races"));

const raceSelect = document.getElementById("raceSelect");

raceSelect.innerHTML="";

racesSnapshot.forEach((doc)=>{

const option=document.createElement("option");

option.value=doc.id;
option.text=doc.id.replaceAll("_"," ").toUpperCase();

raceSelect.appendChild(option);

});

}

loadRaces();



async function loadResults(){

const race=document.getElementById("raceSelect").value;
const session=document.getElementById("sessionSelect").value;

const snapshot=await getDocs(
collection(db,"races",race,"sessions",session,"results")
);

const tableBody=document.querySelector("#resultsTable tbody");

tableBody.innerHTML="";

let results=[];

snapshot.forEach(doc=>{

results.push(doc.data());

});

results.sort((a,b)=>a.position-b.position);

results.forEach(data=>{

const row=document.createElement("tr");

row.innerHTML=`

<td>${data.position}</td>
<td>${data.driver}</td>
<td>${data.team}</td>
<td>${data.points || "-"}</td>

`;

tableBody.appendChild(row);

});

}

window.loadResults=loadResults;

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
   // your config
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadRaces(){

    const races = await getDocs(collection(db,"races"));

    const raceSelect = document.getElementById("raceSelect");

    races.forEach((doc)=>{

        const option = document.createElement("option");
        option.value = doc.id;
        option.text = doc.id;

        raceSelect.appendChild(option);

    });
}

loadRaces();

async function loadResults(){

    const race = document.getElementById("raceSelect").value;
    const session = document.getElementById("sessionSelect").value;

    const snapshot = await getDocs(collection(db,"races",race,session));

    const tableBody = document.querySelector("#resultsTable tbody");
    tableBody.innerHTML="";

    let results = [];

    snapshot.forEach(doc=>{
        results.push(doc.data());
    });

    // sort by position
    results.sort((a,b)=> a.position - b.position);

    results.forEach(data=>{

        const row = document.createElement("tr");

        row.innerHTML = `
        <td>${data.position}</td>
        <td>${data.driver}</td>
        <td>${data.team}</td>
        <td>${data.points || "-"}</td>
        `;

        tableBody.appendChild(row);

    });

}
