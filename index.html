<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>F1 2026 Race Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
<style>
/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;500&display=swap');

:root{
--f1-red:#ff1e00;
--f1-dark:#0b0f1a;
--card-bg:#121726;
--card-glow:rgba(255,30,0,0.2);
--border-soft:rgba(255,255,255,0.06);
}

*{
box-sizing:border-box;
}

body{
font-family:Inter,Arial;
background:
linear-gradient(rgba(10,10,20,.95),rgba(10,10,20,.95)),
repeating-linear-gradient(
90deg,
rgba(255,255,255,0.02) 0px,
rgba(255,255,255,0.02) 1px,
transparent 1px,
transparent 80px
),
#0b0f1a;
color:white;
padding:40px;
}

/* Title */

h1{
font-family:Orbitron;
color:var(--f1-red);
font-size:40px;
letter-spacing:2px;
margin-bottom:30px;
text-shadow:0 0 15px rgba(255,30,0,.6);
}

h2{
font-family:Orbitron;
font-weight:500;
margin-bottom:15px;
letter-spacing:1px;
}

/* Layout */

.container{
display:grid;
grid-template-columns:360px auto;
gap:50px;
align-items:start;
}

/* Panels */

.container > div{
background:var(--card-bg);
padding:25px;
border-radius:14px;
border:1px solid var(--border-soft);
box-shadow:
0 10px 25px rgba(0,0,0,.6),
0 0 25px var(--card-glow);
backdrop-filter: blur(10px);
}

/* Inputs */

input,select,textarea{
width:100%;
padding:10px 12px;
margin-top:5px;
margin-bottom:16px;
border-radius:8px;
border:1px solid var(--border-soft);
background:#0e1322;
color:white;
font-size:14px;
transition:all .2s ease;
}

input:focus,select:focus{
outline:none;
border-color:var(--f1-red);
box-shadow:0 0 10px rgba(255,30,0,.5);
}

/* Button */

button{
background:linear-gradient(45deg,#ff1e00,#ff4a2f);
color:white;
padding:11px;
border:none;
border-radius:8px;
font-weight:600;
letter-spacing:.5px;
cursor:pointer;
transition:all .25s ease;
box-shadow:0 0 12px rgba(255,30,0,.4);
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 18px rgba(255,30,0,.7);
}

/* Table */

table{
width:100%;
border-collapse:collapse;
margin-bottom:20px;
}

th{
text-align:left;
font-size:13px;
padding:10px;
color:#ff7a65;
border-bottom:1px solid var(--border-soft);
}

td{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.03);
}

/* Race cards */

.raceCard{
background:linear-gradient(145deg,#121726,#0e1220);
padding:18px;
border-radius:12px;
margin-bottom:15px;
border:1px solid var(--border-soft);
transition:all .25s ease;
position:relative;
overflow:hidden;
}

.raceCard::before{
content:"";
position:absolute;
top:0;
left:0;
width:4px;
height:100%;
background:var(--f1-red);
box-shadow:0 0 10px var(--f1-red);
}

.raceCard:hover{
transform:translateY(-4px);
box-shadow:
0 10px 20px rgba(0,0,0,.6),
0 0 25px rgba(255,30,0,.35);
}

.raceCard h3{
font-family:Orbitron;
font-size:18px;
margin-bottom:8px;
letter-spacing:1px;
}

.session{
margin-top:6px;
font-size:13px;
color:#d0d3ff;
}

/* Scrollbar */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:var(--f1-red);
border-radius:10px;
}
</style>
</head>

<body>

<h1>🏁 Formula 1 2026 Race Tracker</h1>

<div class="container">

<div>

<h2>Add Session Result</h2>
<a href="results.html">
  <button>View Race Results</button>
</a>
<label>Select Race</label>

<select id="raceSelect">
<option value="">Select Race</option>
<option value="australian_gp">Australian GP</option>
<option value="chinese_gp">Chinese GP</option>
<option value="japanese_gp">Japanese GP</option>
<option value="bahrain_gp">Bahrain GP</option>
<option value="saudi_arabian_gp">Saudi Arabian GP</option>
<option value="miami_gp">Miami GP</option>
<option value="canadian_gp">Canadian GP</option>
<option value="monaco_gp">Monaco GP</option>
<option value="barcelona_gp">Barcelona GP</option>
<option value="austrian_gp">Austrian GP</option>
<option value="british_gp">British GP</option>
<option value="belgian_gp">Belgian GP</option>
<option value="hungarian_gp">Hungarian GP</option>
<option value="dutch_gp">Dutch GP</option>
<option value="italian_gp">Italian GP</option>
<option value="spanish_gp">Spanish GP</option>
<option value="azerbaijan_gp">Azerbaijan GP</option>
<option value="singapore_gp">Singapore GP</option>
<option value="united_states_gp">United States GP</option>
<option value="mexican_gp">Mexican GP</option>
<option value="brazilian_gp">Brazilian GP</option>
<option value="las_vegas_gp">Las Vegas GP</option>
<option value="qatar_gp">Qatar GP</option>
<option value="abu_dhabi_gp">Abu Dhabi GP</option>
</select>

<label>Sprint Weekend?</label>
<input type="checkbox" id="sprintToggle">
  
<label>Select Session</label>

<select id="sessionSelect">
<option value="FP1">FP1</option>
<option value="FP2">FP2</option>
<option value="FP3">FP3</option>
<option value="SprintQualifying" class="sprintSession">Sprint Qualifying</option>
<option value="SprintRace" class="sprintSession">Sprint Race</option>
<option value="Qualifying">Qualifying</option>
<option value="Race">Race</option>
</select>

<table id="resultsTable">

<tr>
<th>Position</th>
<th>Driver</th>
<th>Team</th>
<th>Points</th>
</tr>

</table>

<button onclick="addSession()">Save Session</button>

</div>

<div>

<h2>Race Weekend Data</h2>

<div id="raceList"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKKYg5DzOyj-b4yiZbLZLqki12SIvqn-w",
  authDomain: "formula1-93967.firebaseapp.com",
  projectId: "formula1-93967",
  storageBucket: "formula1-93967.firebasestorage.app",
  messagingSenderId: "605887356094",
  appId: "1:605887356094:web:ea144cee6a249791d612ef",
  measurementId: "G-GZREC19YKH"
};

const drivers=[
  "Max Verstappen",
  "Sergio Perez",
  "Lewis Hamilton",
  "George Russell",
  "Charles Leclerc",
  "Carlos Sainz",
  "Lando Norris",
  "Oscar Piastri",
  "Fernando Alonso",
  "Lance Stroll",
  "Pierre Gasly",
  "Esteban Ocon",
  "Arvid Lindblad",
  "Isack Hadjar",
  "Valtteri Bottas",
  "Liam Lawson",
  "Alex Albon",
  "Kimi Antonelli",
  "Oliver Bearman",
  "Nico Hulkenberg",
  "Gabriel Bortoleto",
  "Franco Colapinto"
];

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Sprint toggle logic

const sprintToggle=document.getElementById("sprintToggle");

sprintToggle.addEventListener("change",()=>{

const sprintOptions=document.querySelectorAll(".sprintSession");

sprintOptions.forEach(opt=>{
opt.style.display = sprintToggle.checked ? "block" : "none";
});

});

document.querySelectorAll(".sprintSession").forEach(opt=>{
opt.style.display="none";
});

const racePoints = {
1:25,
2:18,
3:15,
4:12,
5:10,
6:8,
7:6,
8:4,
9:2,
10:1
};

const sprintPoints = {
1:8,
2:7,
3:6,
4:5,
5:4,
6:3,
7:2,
8:1
};

async function addSession(){

const race=document.getElementById("raceSelect").value;
const session=document.getElementById("sessionSelect").value;

if(!race){
alert("Please select a race");
return;
}

await setDoc(doc(db,"2026_races",race),{
raceName: race,
sprint: document.getElementById("sprintToggle").checked
},{merge:true});
  
const rows=document.querySelectorAll("#resultsTable tr");

for(let i=1;i<rows.length;i++){

const row=rows[i];

const driver=row.cells[1].querySelector("select").value;

if(!driver){
alert("Please select a driver for position " + i);
return;
}

const team=row.cells[2].querySelector("input").value;

let points=0;

if(session==="Race"){
points = racePoints[i] || 0;
row.cells[3].querySelector("input").value = points;
}

if(session==="SprintRace"){
points = sprintPoints[i] || 0;
row.cells[3].querySelector("input").value = points;
}

await addDoc(collection(db,"2026_races",race,"sessions",session,"results"),{

session:session,
position:i,
driver:driver,
team:team,
points:points,
timestamp:Date.now()

});

}

const driver=row.cells[1].querySelector("select").value;

if(!driver){
alert("Please select a driver for position " + i);
return;
}
  
const team=row.cells[2].querySelector("input").value;
let points = 0;

if(session === "Race" || session === "SprintRace"){
points = row.cells[3].querySelector("input").value;
}

await addDoc(collection(db,"2026_races",race,"sessions",session,"results"),{

session:session,
position:i,
driver:driver,
team:team,
points:points,
timestamp:Date.now()

});

});

alert("Session saved successfully!");

loadData();

const sessionSelect=document.getElementById("sessionSelect");

sessionSelect.addEventListener("change",()=>{

const inputs=document.querySelectorAll("#resultsTable input[type='number']");

if(sessionSelect.value==="Race" || sessionSelect.value==="SprintRace"){

inputs.forEach(i=>i.disabled=false);

}else{

inputs.forEach(i=>{
i.disabled=true;
i.value="";
});

}

}); 
  
}

async function loadData(){

const raceList=document.getElementById("raceList");
raceList.innerHTML="";

const races=[
"australian_gp",
"chinese_gp",
"japanese_gp",
"bahrain_gp",
"saudi_arabian_gp",
"miami_gp",
"canadian_gp",
"monaco_gp",
"barcelona_gp",
"austrian_gp",
"british_gp",
"belgian_gp",
"hungarian_gp",
"dutch_gp",
"italian_gp",
"spanish_gp",
"azerbaijan_gp",
"singapore_gp",
"united_states_gp",
"mexican_gp",
"brazilian_gp",
"las_vegas_gp",
"qatar_gp",
"abu_dhabi_gp"
];

for(const race of races){

const snapshot=await getDocs(collection(db,"2026_races",race,"sessions","Race","results"));

if(snapshot.empty) continue;

const card=document.createElement("div");
card.className="raceCard";

let html="<h3>"+race.replaceAll("_"," ").toUpperCase()+"</h3>";

snapshot.forEach(doc=>{

const d=doc.data();

html+=`<div class="session">
${d.session} — ${d.position}. ${d.driver} (${d.team}) ${d.points} pts
</div>`;

});

card.innerHTML=html;

raceList.appendChild(card);

}

}

loadData();

const driverTeams={

"Max Verstappen":"Red Bull Racing",
"Isack Hadjar":"Red Bull Racing",

"Charles Leclerc":"Ferrari",
"Lewis Hamilton":"Ferrari",

"Lando Norris":"McLaren",
"Oscar Piastri":"McLaren",

"George Russell":"Mercedes",
"Kimi Antonelli":"Mercedes",

"Fernando Alonso":"Aston Martin",
"Lance Stroll":"Aston Martin",

"Gabriel Bortoleto":"Audi",
"Nico Hulkenberg":"Audi",

"Valtteri Bottas":"Cadillac",
"Sergio Perez":"Cadillac",

"Pierre Gasly":"Alpine",
"Franco Colapinto":"Alpine",

"Carlos Sainz":"Williams",
"Alex Albon":"Williams",

"Esteban Ocon":"Haas F1 Team",
"Oliver Bearman":"Haas F1 Team",

"Arvid Lindblad":"Racing Bulls",
"Liam Lawson":"Racing Bulls"

};
  
document.addEventListener("DOMContentLoaded", function () {

const table = document.getElementById("resultsTable");

drivers.forEach((driver, i) => {

let row = table.insertRow();

row.innerHTML =
"<td>" + (i+1) + "</td>" +
"<td><select class='driverSelect'></select></td>" +
"<td><input class='teamInput' readonly></td>" +
"<td><input type='number' placeholder='Points'></td>";

const select=row.querySelector(".driverSelect");

/* Placeholder option */

let placeholder=document.createElement("option");
placeholder.text="Select Driver";
placeholder.value="";
placeholder.disabled=true;
placeholder.selected=true;

select.appendChild(placeholder);

/* Driver list */

drivers.forEach(d=>{
let option=document.createElement("option");
option.value=d;
option.text=d;
select.appendChild(option);
});

new TomSelect(select,{
create:false,
sortField:"text",
placeholder:"Search Driver..."
});
  
select.addEventListener("change",()=>{

const team=row.querySelector(".teamInput");

team.value = driverTeams[select.value] || "";

});  
  
});

});
  
window.addSession=addSession;

</script>

</body>
</html>
