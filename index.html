<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>F1 2026 Race Tracker</title>

<style>

body{
font-family: Arial;
background:#0b0f1a;
color:white;
padding:30px;
}

h1{
color:#ff1e00;
}

.container{
display:grid;
grid-template-columns:350px auto;
gap:40px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

button{
background:#ff1e00;
color:white;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff3c1f;
}

.raceCard{
background:#151a2c;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.session{
margin-top:6px;
font-size:14px;
}

</style>
</head>

<body>

<h1>🏁 Formula 1 2026 Race Tracker</h1>

<div class="container">

<div>

<h2>Add Session Result</h2>

<label>Select Race</label>

<select id="raceSelect">
<option value="">Select Race</option>
<option value="australian_gp">Australian GP</option>
<option value="chinese_gp">Chinese GP</option>
<option value="japanese_gp">Japanese GP</option>
<option value="bahrain_gp">Bahrain GP</option>
<option value="saudi_arabian_gp">Saudi Arabian GP</option>
<option value="miami_gp">Miami GP</option>
<option value="canadian_gp">Canadian GP</option>
<option value="monaco_gp">Monaco GP</option>
<option value="barcelona_gp">Barcelona GP</option>
<option value="austrian_gp">Austrian GP</option>
<option value="british_gp">British GP</option>
<option value="belgian_gp">Belgian GP</option>
<option value="hungarian_gp">Hungarian GP</option>
<option value="dutch_gp">Dutch GP</option>
<option value="italian_gp">Italina GP</option>
<option value="spanish_gp">Spanish GP</option>
<option value="azerbaijan_gp">Azerbaijan GP</option>
<option value="singapore_gp">Singapore GP</option>
<option value="united_states_gp">United States GP</option>
<option value="mexican_gp">Mexican GP</option>
<option value="brazilian_gp">Brazilian GP</option>
<option value="las_vegas_gp">Las Vegas GP</option>
<option value="qatar_gp">Qatar GP</option>
<option value="abu_dhabi_gp">Abu Dhabi GP</option>
</select>

<label>Sprint Weekend?</label>
<input type="checkbox" id="sprintToggle">
  
<label>Select Session</label>

<select id="sessionSelect">
<option value="FP1">FP1</option>
<option value="FP2">FP2</option>
<option value="FP3">FP3</option>
<option value="SprintQualifying" class="sprintSession">Sprint Qualifying</option>
<option value="SprintRace" class="sprintSession">Sprint Race</option>
<option value="Qualifying">Qualifying</option>
<option value="Race">Race</option>
</select>

<table id="resultsTable">

<tr>
<th>Position</th>
<th>Driver</th>
<th>Team</th>
<th>Points</th>
</tr>

</table>

<button onclick="addSession()">Save Session</button>

</div>

<div>

<h2>Race Weekend Data</h2>

<div id="raceList"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKKYg5DzOyj-b4yiZbLZLqki12SIvqn-w",
  authDomain: "formula1-93967.firebaseapp.com",
  projectId: "formula1-93967",
  storageBucket: "formula1-93967.firebasestorage.app",
  messagingSenderId: "605887356094",
  appId: "1:605887356094:web:ea144cee6a249791d612ef",
  measurementId: "G-GZREC19YKH"
};

const drivers=[
  "Max Verstappen",
  "Sergio Perez",
  "Lewis Hamilton",
  "George Russell",
  "Charles Leclerc",
  "Carlos Sainz",
  "Lando Norris",
  "Oscar Piastri",
  "Fernando Alonso",
  "Lance Stroll",
  "Pierre Gasly",
  "Esteban Ocon",
  "Arvid Lindblad",
  "Isack Hadjar",
  "Valtteri Bottas",
  "Liam Lawson",
  "Alex Albon",
  "Kimi Antonelli",
  "Oliver Bearman",
  "Nico Hulkenberg",
  "Gabriel Bortoleto",
  "Franco Colapinto"
];

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Sprint toggle logic

const sprintToggle=document.getElementById("sprintToggle");

sprintToggle.addEventListener("change",()=>{

const sprintOptions=document.querySelectorAll(".sprintSession");

sprintOptions.forEach(opt=>{
opt.style.display = sprintToggle.checked ? "block" : "none";
});

});

document.querySelectorAll(".sprintSession").forEach(opt=>{
opt.style.display="none";
});

async function addSession(){

const race=document.getElementById("raceSelect").value;
const session=document.getElementById("sessionSelect").value;

if(!race){
alert("Please select a race");
return;
}
import { doc,setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

await setDoc(doc(db,"races",race),{
raceName: race,
sprint: document.getElementById("sprintToggle").checked
},{merge:true});
  
const rows=document.querySelectorAll("#resultsTable tr");

rows.forEach(async(row,i)=>{

if(i===0) return;

const driver=row.cells[1].innerText;
const team=row.cells[2].querySelector("input").value;
const points=row.cells[3].querySelector("input").value;

await addDoc(collection(db,"races",race,"sessions",session,"results"),{

session:session,
position:i,
driver:driver,
team:team,
points:points,
timestamp:Date.now()

});

});

alert("Session saved successfully!");

loadData();

}

async function loadData(){

const raceList=document.getElementById("raceList");
raceList.innerHTML="";

const races=[
"australian_gp",
"chinese_gp",
"japanese_gp",
"bahrain_gp",
"saudi_arabian_gp",
"miami_gp",
"canadian_gp",
"monaco_gp",
"barcelona_gp",
"austrian_gp",
"british_gp",
"belgian_gp",
"hungarian_gp",
"dutch_gp",
"italian_gp",
"spanish_gp",
"azerbaijan_gp",
"singapore_gp",
"united_states_gp",
"mexican_gp",
"brazilian_gp",
"las_vegas_gp",
"qatar_gp",
"abu_dhabi_gp"
];

for(const race of races){

const snapshot=await getDocs(collection(db,"races",race,"sessions","Race","results"));

if(snapshot.empty) continue;

const card=document.createElement("div");
card.className="raceCard";

let html="<h3>"+race.replaceAll("_"," ").toUpperCase()+"</h3>";

snapshot.forEach(doc=>{

const d=doc.data();

html+=`<div class="session">
${d.session} — ${d.position}. ${d.driver} (${d.team}) ${d.points} pts
</div>`;

});

card.innerHTML=html;

raceList.appendChild(card);

}

}

loadData();

const table=document.getElementById("resultsTable");

drivers.forEach((d,i)=>{

let row=table.insertRow();

row.innerHTML=`
<td>${i+1}</td>
<td>${d}</td>
<td><input placeholder="Team"></td>
<td><input type="number" placeholder="Points"></td>
`;

});
  
window.addSession=addSession;

</script>

</body>
</html>
